spring:
  application:
    name: shop-online
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

server:
  port: 8080

logging:
  config: classpath:logback-spring.xml

# MyBatis 配置
mybatis:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.shop.online.module.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# PageHelper 分页配置
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

# Knife4j 接口文档配置
knife4j:
  enable: true
  setting:
    language: zh-CN

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: '用户端'
      paths-to-match: '/api/**'
      packages-to-scan: com.shop.online.module
    - group: '管理端'
      paths-to-match: '/admin/**'
      packages-to-scan: com.shop.online.module.admin

# JWT 配置
jwt:
  secret: your-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-token-expiration: 7200
  refresh-token-expiration: 604800

# 应用配置
app:
  name: Shop-Online
  version: 1.0.0
